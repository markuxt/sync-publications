name: 'Sync Publications from OpenAlex'
description: 'Fetches publications from OpenAlex based on member ORCIDs and syncs them to your publications directory'

branding:
  icon: "activity"
  color: "green"

inputs:
  ror_id:
    description: 'ROR ID of the institution (e.g., https://ror.org/03y4dt428)'
    required: true
  contact_email:
    description: 'Contact email for OpenAlex API requests'
    required: true
  members_dir:
    description: >
      Path to the members directory, where member markdown with ORCIDs is
      scanned. Defaults to src/members. Set this if your members live under
      a different folder (e.g. src/people). Both relative (to repo root)
      and absolute paths work.
    required: false
    default: ''
  publications_dir:
    description: >
      Path to the publications directory, where generated publication
      markdown and screenshots are written. Defaults to src/publications.
      Independent of members_dir, so members and publications can live
      under different roots. Both relative (to repo root) and absolute
      paths work.
    required: false
    default: ''

outputs:
  new_publications_count:
    description: 'Number of new publication files added'
  new_publications_files:
    description: 'List of new publication file paths'

runs:
  using: 'node24'
  main: 'dist/index.cjs'
